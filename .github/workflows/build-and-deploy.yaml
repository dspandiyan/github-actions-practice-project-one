name: Build and deploy the practice project
on: push
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Download the code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Add lint configuration
        run: npm init @eslint/config@latest -- --yes
      - name: Run lint
        run: npm run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Download the code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Add lint configuration
        run: npm init @eslint/config@latest -- --yes
      - name: Test code
        run: npm run test

  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Download the code
        uses: actions/checkout@v3
      - name: Install dependencies
        run: npm ci
      - name: Add lint configuration
        run: npm init @eslint/config@latest -- --yes
      - name: Build code
        run: npm run build
      - name: Deploy code
        run: echo "Deployment started"
      - name: Deployment status
        run: echo "Deployment completed successfully"
